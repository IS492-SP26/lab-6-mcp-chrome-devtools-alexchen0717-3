<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker Pro</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <img src="assets/logo1.png" alt="Task Tracker Logo" class="logo">
            <h1>Task Tracker Pro</h1>
            <p class="subtitle">Manage your tasks efficiently</p>
        </header>
        <main class="main-content">
            <div class="input-section">
                <input type="text" id="taskInput" class="task-input" placeholder="Add a new task...">
                <button id="addTaskBtn" class="add-btn">Add Task</button>
            </div>
            <div class="task-list" id="taskList">
                <p class="empty-message">No tasks yet. Add one to get started!</p>
            </div>
        </main>
        <footer>
            <p>© 2025 Task Tracker Pro. Built with love.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
